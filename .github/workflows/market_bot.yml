name: Market Bot

on:
  schedule:
    # 9:20 AM IST (3:50 UTC)
    - cron: "50 3 * * 1-5"
    # 10:00 AM IST (4:30 UTC)
    - cron: "30 4 * * 1-5"
    # 11:00 AM IST (5:30 UTC)
    - cron: "30 5 * * 1-5"
    # 12:00 PM IST (6:30 UTC)
    - cron: "30 6 * * 1-5"
    # 1:00 PM IST (7:30 UTC)
    - cron: "30 7 * * 1-5"
    # 2:00 PM IST (8:30 UTC)
    - cron: "30 8 * * 1-5"
    # 3:20 PM IST (9:50 UTC)
    - cron: "50 9 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      
      - name: Install Dependencies
        run: |
          pip install yfinance pandas ta requests matplotlib mplfinance
      
      - name: Run Bot
        run: python daily_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
