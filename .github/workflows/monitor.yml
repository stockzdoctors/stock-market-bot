name: SL / Target Hit Monitor

on:
  schedule:
    # Every 15 min from 9:30 AM to 3:30 PM IST (4:00–10:00 UTC) Mon–Fri
    - cron: '*/15 4-9 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode — send to test group only'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Monitor
        run: python monitor_alert.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
