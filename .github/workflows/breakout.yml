name: First 15-Min Candle Breakout Alert

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode — send to test group only'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  breakout-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Breakout Alert
        run: python breakout_alert.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
