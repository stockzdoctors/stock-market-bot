name: Daily Stock Market Bot

on:
  schedule:
    # 9:20 AM IST (3:50 UTC) Monday–Friday only
    - cron: '50 3 * * 1-5'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode — send to test group only'
        type: boolean
        default: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Morning Bot
        run: python daily_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
